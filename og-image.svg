<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Fast Wealth - Domain Flipping Course 2026">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="gemGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.18)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.06)"/>
    </linearGradient>
    <radialGradient id="glow1" cx="20%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.12)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <radialGradient id="glow2" cx="80%" cy="80%" r="50%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.08)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="rgba(0,0,0,0.3)"/>
    </filter>
    <filter id="textShadow" x="-5%" y="-5%" width="110%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="rgba(0,0,0,0.25)"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Decorative circles -->
  <circle cx="1050" cy="100" r="220" fill="rgba(255,255,255,0.05)"/>
  <circle cx="1080" cy="80" r="140" fill="rgba(255,255,255,0.05)"/>
  <circle cx="120" cy="520" r="180" fill="rgba(255,255,255,0.04)"/>

  <!-- Large diamond left side -->
  <g transform="translate(90, 160)" filter="url(#shadow)">
    <polygon points="110,0 220,90 110,260 0,90" fill="url(#gemGrad)" opacity="0.92"/>
    <line x1="110" y1="0" x2="110" y2="260" stroke="rgba(99,102,241,0.4)" stroke-width="1.5"/>
    <line x1="0" y1="90" x2="220" y2="90" stroke="rgba(99,102,241,0.4)" stroke-width="1.5"/>
    <polygon points="110,0 180,80 110,100 40,80" fill="white" opacity="0.25"/>
  </g>

  <!-- Main headline -->
  <text x="310" y="175" font-family="'Poppins', Arial Black, sans-serif" font-weight="800" font-size="68" fill="white" filter="url(#textShadow)" letter-spacing="-2">Turn $10 Domains</text>
  <text x="310" y="258" font-family="'Poppins', Arial Black, sans-serif" font-weight="800" font-size="68" fill="white" filter="url(#textShadow)" letter-spacing="-2">Into $1,000+ Profits</text>

  <!-- Subheadline -->
  <text x="310" y="316" font-family="Arial, sans-serif" font-weight="400" font-size="28" fill="rgba(255,255,255,0.9)">The proven domain flipping system for 2026</text>

  <!-- Divider line -->
  <rect x="310" y="340" width="560" height="3" rx="2" fill="rgba(255,255,255,0.3)"/>

  <!-- Stats row -->
  <!-- Stat 1 -->
  <rect x="310" y="362" width="165" height="88" rx="14" fill="url(#cardGrad)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="393" y="400" font-family="'Poppins', Arial, sans-serif" font-weight="800" font-size="30" fill="white" text-anchor="middle">10,000+</text>
  <text x="393" y="426" font-family="Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.8)" text-anchor="middle">Active Students</text>

  <!-- Stat 2 -->
  <rect x="490" y="362" width="165" height="88" rx="14" fill="url(#cardGrad)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="573" y="400" font-family="'Poppins', Arial, sans-serif" font-weight="800" font-size="30" fill="white" text-anchor="middle">$2.4M+</text>
  <text x="573" y="426" font-family="Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.8)" text-anchor="middle">Student Earnings</text>

  <!-- Stat 3 -->
  <rect x="670" y="362" width="165" height="88" rx="14" fill="url(#cardGrad)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="753" y="400" font-family="'Poppins', Arial, sans-serif" font-weight="800" font-size="30" fill="white" text-anchor="middle">60-Day</text>
  <text x="753" y="426" font-family="Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.8)" text-anchor="middle">Money-Back Guarantee</text>

  <!-- CTA button shape -->
  <rect x="310" y="474" width="340" height="64" rx="14" fill="#ef4444" filter="url(#shadow)"/>
  <text x="480" y="514" font-family="'Poppins', Arial Black, sans-serif" font-weight="700" font-size="22" fill="white" text-anchor="middle">🚀 Start Free Today</text>

  <!-- Logo / brand bottom right -->
  <polygon points="1082,560 1108,578 1082,614 1056,578" fill="url(#gemGrad)" opacity="0.85"/>
  <line x1="1082" y1="560" x2="1082" y2="614" stroke="rgba(99,102,241,0.4)" stroke-width="1"/>
  <line x1="1056" y1="578" x2="1108" y2="578" stroke="rgba(99,102,241,0.4)" stroke-width="1"/>
  <text x="1118" y="594" font-family="'Poppins', Arial Black, sans-serif" font-weight="800" font-size="22" fill="white" opacity="0.9">Fast Wealth</text>

  <!-- URL -->
  <text x="600" y="618" font-family="Arial, sans-serif" font-size="15" fill="rgba(255,255,255,0.55)" text-anchor="middle">fastwealth.4ourmedia.com</text>
</svg>
