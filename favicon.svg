<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="gem" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" ry="14" fill="url(#bg)"/>
  <!-- Diamond / gem shape -->
  <polygon points="32,10 52,26 32,56 12,26" fill="url(#gem)" opacity="0.95"/>
  <!-- Inner facet lines -->
  <line x1="32" y1="10" x2="32" y2="56" stroke="rgba(99,102,241,0.35)" stroke-width="1"/>
  <line x1="12" y1="26" x2="52" y2="26" stroke="rgba(99,102,241,0.35)" stroke-width="1"/>
  <line x1="12" y1="26" x2="32" y2="56" stroke="rgba(99,102,241,0.2)" stroke-width="0.8"/>
  <line x1="52" y1="26" x2="32" y2="56" stroke="rgba(99,102,241,0.2)" stroke-width="0.8"/>
  <!-- Shine highlight -->
  <polygon points="32,10 44,24 32,28 20,24" fill="white" opacity="0.35"/>
</svg>
