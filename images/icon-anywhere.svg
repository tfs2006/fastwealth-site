<!-- Work Anywhere Icon: globe with location pin -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" role="img" aria-label="Work from anywhere">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#eef2ff"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
  </defs>
  <rect width="80" height="80" rx="20" fill="url(#bg)"/>
  <!-- Globe circle -->
  <circle cx="40" cy="40" r="22" fill="none" stroke="#6366f1" stroke-width="2.5"/>
  <!-- Meridians -->
  <ellipse cx="40" cy="40" rx="10" ry="22" fill="none" stroke="#6366f1" stroke-width="1.5" opacity="0.5"/>
  <!-- Latitude lines -->
  <line x1="18" y1="40" x2="62" y2="40" stroke="#6366f1" stroke-width="1.5" opacity="0.5"/>
  <path d="M22,30 Q40,26 58,30" fill="none" stroke="#6366f1" stroke-width="1.5" opacity="0.4"/>
  <path d="M22,50 Q40,54 58,50" fill="none" stroke="#6366f1" stroke-width="1.5" opacity="0.4"/>
  <!-- Pin -->
  <circle cx="40" cy="32" r="5" fill="#ef4444"/>
  <line x1="40" y1="37" x2="40" y2="46" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="40" cy="32" r="2.5" fill="white" opacity="0.6"/>
</svg>
