<!-- ClickBank Integration Icon: shield with CB badge -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" role="img" aria-label="Proven ClickBank integration">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#eef2ff"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
    <linearGradient id="shield" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
  </defs>
  <rect width="80" height="80" rx="20" fill="url(#bg)"/>
  <!-- Shield -->
  <path d="M40,14 L60,22 L60,44 Q60,58 40,66 Q20,58 20,44 L20,22 Z" fill="url(#shield)"/>
  <!-- CB text -->
  <text x="40" y="46" font-family="Arial Black, sans-serif" font-weight="900" font-size="16" fill="white" text-anchor="middle">CB</text>
  <!-- Star -->
  <polygon points="40,22 42,28 48,28 43,32 45,38 40,34 35,38 37,32 32,28 38,28" fill="white" opacity="0.9"/>
</svg>
