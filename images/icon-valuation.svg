<!-- Diamond with price tag / valuation mastery -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" role="img" aria-label="Domain valuation mastery">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#eef2ff"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
    <linearGradient id="gem" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
  </defs>
  <rect width="80" height="80" rx="20" fill="url(#bg)"/>
  <!-- Diamond -->
  <polygon points="40,12 62,30 40,62 18,30" fill="url(#gem)" opacity="0.9"/>
  <line x1="40" y1="12" x2="40" y2="62" stroke="white" stroke-width="1" opacity="0.3"/>
  <line x1="18" y1="30" x2="62" y2="30" stroke="white" stroke-width="1" opacity="0.3"/>
  <polygon points="40,12 54,26 40,30 26,26" fill="white" opacity="0.2"/>
  <!-- Price tag -->
  <rect x="50" y="10" width="22" height="15" rx="4" fill="#f59e0b"/>
  <circle cx="55" cy="14" r="2" fill="white"/>
  <text x="62" y="22" font-family="Arial Black, sans-serif" font-weight="900" font-size="8" fill="white" text-anchor="middle">$$$</text>
  <line x1="50" y1="15" x2="46" y2="22" stroke="#f59e0b" stroke-width="2"/>
</svg>
