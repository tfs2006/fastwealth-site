<!-- No Skills Required Icon: open book with checkmark / thumbs up -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" role="img" aria-label="No technical skills required">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#eef2ff"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
  </defs>
  <rect width="80" height="80" rx="20" fill="url(#bg)"/>
  <!-- Open book -->
  <path d="M18,22 L40,28 L62,22 L62,56 L40,62 L18,56 Z" fill="white" stroke="#6366f1" stroke-width="2" stroke-linejoin="round"/>
  <line x1="40" y1="28" x2="40" y2="62" stroke="#6366f1" stroke-width="2"/>
  <!-- Left page lines -->
  <line x1="22" y1="35" x2="37" y2="38" stroke="#c7d2fe" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="22" y1="42" x2="37" y2="45" stroke="#c7d2fe" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="22" y1="49" x2="37" y2="52" stroke="#c7d2fe" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Right page: green check -->
  <circle cx="51" cy="44" r="9" fill="#22c55e" opacity="0.9"/>
  <polyline points="45,44 49,49 57,39" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
