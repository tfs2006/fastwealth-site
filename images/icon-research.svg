<!-- Magnifying glass / search for research -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" role="img" aria-label="Research and identify domains">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#eef2ff"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
  </defs>
  <rect width="80" height="80" rx="20" fill="url(#bg)"/>
  <!-- Search circle -->
  <circle cx="35" cy="35" r="16" fill="none" stroke="#6366f1" stroke-width="3.5"/>
  <!-- Handle -->
  <line x1="47" y1="47" x2="62" y2="62" stroke="#6366f1" stroke-width="4" stroke-linecap="round"/>
  <!-- Inner cross-hair lines -->
  <line x1="35" y1="22" x2="35" y2="48" stroke="#6366f1" stroke-width="1.5" opacity="0.35"/>
  <line x1="22" y1="35" x2="48" y2="35" stroke="#6366f1" stroke-width="1.5" opacity="0.35"/>
  <!-- Dollar detail inside -->
  <text x="35" y="40" font-family="Arial Black, sans-serif" font-weight="900" font-size="15" fill="#6366f1" text-anchor="middle" opacity="0.7">$</text>
</svg>
