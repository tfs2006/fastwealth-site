<!-- Stack of boxes / scaling portfolio -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" role="img" aria-label="Scale your portfolio">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#eef2ff"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
  </defs>
  <rect width="80" height="80" rx="20" fill="url(#bg)"/>
  <!-- Bottom box -->
  <rect x="12" y="50" width="56" height="16" rx="4" fill="#6366f1"/>
  <line x1="40" y1="50" x2="40" y2="66" stroke="white" stroke-width="1" opacity="0.3"/>
  <!-- Middle box -->
  <rect x="20" y="34" width="40" height="16" rx="4" fill="#8b5cf6"/>
  <line x1="40" y1="34" x2="40" y2="50" stroke="white" stroke-width="1" opacity="0.3"/>
  <!-- Top box -->
  <rect x="28" y="18" width="24" height="16" rx="4" fill="#a855f7"/>
  <line x1="40" y1="18" x2="40" y2="34" stroke="white" stroke-width="1" opacity="0.3"/>
  <!-- Up arrow overlay -->
  <polyline points="40,10 34,18 46,18" fill="white" stroke="none" opacity="0.9"/>
  <!-- Domain icons on boxes -->
  <text x="40" y="61" font-family="Arial, sans-serif" font-size="7" fill="white" text-anchor="middle" opacity="0.8">.com .net .io</text>
  <text x="40" y="45" font-family="Arial, sans-serif" font-size="7" fill="white" text-anchor="middle" opacity="0.8">.com .co</text>
  <text x="40" y="29" font-family="Arial, sans-serif" font-size="7" fill="white" text-anchor="middle" opacity="0.8">.com</text>
</svg>
