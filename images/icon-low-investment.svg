<!-- Low Investment Icon: coins/money stack -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" role="img" aria-label="Low startup investment">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#eef2ff"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
  </defs>
  <rect width="80" height="80" rx="20" fill="url(#bg)"/>
  <!-- Dollar sign circle -->
  <circle cx="40" cy="36" r="20" fill="none" stroke="#6366f1" stroke-width="3"/>
  <text x="40" y="43" font-family="Arial Black, sans-serif" font-weight="900" font-size="22" fill="#6366f1" text-anchor="middle">$</text>
  <!-- Arrow up -->
  <polyline points="34,62 40,55 46,62" fill="none" stroke="#22c55e" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="40" y1="55" x2="40" y2="70" stroke="#22c55e" stroke-width="3" stroke-linecap="round"/>
</svg>
