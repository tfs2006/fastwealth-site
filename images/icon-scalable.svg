<!-- Scalable Business Icon: bar chart trending up -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" role="img" aria-label="Scalable business model">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#eef2ff"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
  </defs>
  <rect width="80" height="80" rx="20" fill="url(#bg)"/>
  <!-- Bars -->
  <rect x="14" y="48" width="12" height="16" rx="3" fill="#6366f1" opacity="0.5"/>
  <rect x="30" y="38" width="12" height="26" rx="3" fill="#6366f1" opacity="0.7"/>
  <rect x="46" y="26" width="12" height="38" rx="3" fill="#6366f1"/>
  <!-- Trend arrow -->
  <polyline points="14,46 30,36 46,24 62,16" fill="none" stroke="#22c55e" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <polygon points="62,16 53,17 58,25" fill="#22c55e"/>
</svg>
