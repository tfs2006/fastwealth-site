<!-- Lightning bolt / quick-flip strategies -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" role="img" aria-label="Quick-flip strategies">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#eef2ff"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
  </defs>
  <rect width="80" height="80" rx="20" fill="url(#bg)"/>
  <!-- Lightning bolt -->
  <polygon points="46,10 28,42 40,42 34,70 52,38 40,38" fill="url(#bolt)" opacity="0.95"/>
  <!-- Subtle glow rings -->
  <circle cx="40" cy="40" r="26" fill="none" stroke="#f59e0b" stroke-width="1.5" opacity="0.2"/>
  <circle cx="40" cy="40" r="32" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.1"/>
  <!-- Speed lines -->
  <line x1="12" y1="28" x2="24" y2="28" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="10" y1="36" x2="22" y2="36" stroke="#f59e0b" stroke-width="2" stroke-linecap="round" opacity="0.35"/>
  <line x1="12" y1="44" x2="24" y2="44" stroke="#f59e0b" stroke-width="1.5" stroke-linecap="round" opacity="0.25"/>
</svg>
