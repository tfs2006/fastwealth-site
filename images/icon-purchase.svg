<!-- Shopping cart / purchase smart -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" role="img" aria-label="Purchase domains smart">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#eef2ff"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
  </defs>
  <rect width="80" height="80" rx="20" fill="url(#bg)"/>
  <!-- Cart body -->
  <path d="M14,18 L22,18 L30,50 L58,50 L64,28 L26,28" fill="none" stroke="#6366f1" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Cart wheels -->
  <circle cx="33" cy="58" r="5" fill="#6366f1"/>
  <circle cx="55" cy="58" r="5" fill="#6366f1"/>
  <!-- Price tag -->
  <rect x="42" y="16" width="22" height="16" rx="5" fill="#22c55e"/>
  <text x="53" y="28" font-family="Arial Black, sans-serif" font-weight="900" font-size="10" fill="white" text-anchor="middle">LOW $</text>
</svg>
